name: CI / CD

# Build · typecheck · E2E on every push & PR; deploy preview on PRs, production on main.
on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  edge-functions:
    name: Edge Functions (Deno check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Type-check Supabase Edge Functions with Deno (not Node)
        working-directory: supabase/functions
        run: deno check **/*.ts

  e2e:
    name: E2E (Puppeteer)
    runs-on: ubuntu-latest
    needs: quality
    env:
      VITE_AUTH_MODE: sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Start dev server (sandbox) on :3001
        run: npm run dev -- --port=3001 &
      - name: Wait for server
        run: npx wait-on http://localhost:3001 --timeout 60000
      - name: Run E2E suite
        run: node docs/testing/e2e_runner.cjs

  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.event_name == 'pull_request'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Vercel deploy (preview)
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set → skipping deploy (manual step)"; exit 0; fi
          npx vercel deploy --token="$VERCEL_TOKEN" --yes

  deploy-production:
    name: Deploy Production (Vercel)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Vercel deploy (production)
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set → production promotion is the manual step"; exit 0; fi
          npx vercel deploy --prod --token="$VERCEL_TOKEN" --yes

# ── Manual action required (documented) ───────────────────────────────────────
# Production auto-promotion runs ONLY when these repo secrets are set:
#   VERCEL_TOKEN · VERCEL_ORG_ID · VERCEL_PROJECT_ID
# Until an operator adds those secrets (Settings → Secrets → Actions), the
# deploy jobs are skipped (the `if:` guard) and production promotion is the single
# remaining manual step. quality + e2e always run.
